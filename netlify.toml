[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Environment variables needed at runtime (set real values in Netlify dashboard):
# RESEND_API_KEY        — for sending lead emails
# RECIPIENT_EMAIL       — Kristina's email address
# NEXT_PUBLIC_BOOKING_URL — Calendly/booking link
